# Task 1 — NDVI Time Series Analysis by Crop Type
# CDL + MODIS NDVI phenology comparison (Corn Belt)
#
# ACTIVE KEYS: cdl.crop_classes, output.*, run.seed
# The remaining sections document future pipeline extensions.

study_area:
  states:                            # U.S. Corn Belt
    - Iowa
    - Nebraska
    - Illinois
    - Indiana
    - Ohio
    - Minnesota
    - Missouri
    - South Dakota
    - Wisconsin
    - Kansas
    - North Dakota
    - Kentucky
    - Michigan
  bbox: null                         # [lon_min, lat_min, lon_max, lat_max] — override states if set

cdl:
  crop_classes:
    corn: 1
    soybean: 5
    winter_wheat: 24
    # --- add more crop types here (notebook picks them up automatically) ---
    # sorghum: 4
    # spring_wheat: 23
    # cotton: 2
    # rice: 3
    # alfalfa: 36
  data_path: data/raw/cdl/

ndvi:
  product: MODIS_NDVI_250m           # CropSmart MODIS NDVI composite
  temporal_resolution: weekly        # daily | weekly
  growing_season_doy: [100, 310]     # approximate DOY window (mid-April → early Nov)
  data_path: data/raw/ndvi/

# Multi-year phenology: auto-discovers every calendar year on disk that has both a
# CDL column (cdl_{Y} in cdl_stack_wide.parquet) and an NDVI file
# (ndvi_weekly_{Y}_wide.parquet). Use year_min/year_max to clip range, or
# explicit to pick specific years.
phenology_years:
  year_min: 2008                     # CDL starts at 2008
  year_max: null                     # null → use latest available
  # explicit: [2018, 2019, 2020, 2021, 2022]  # optional: override with specific years

# --- Not yet wired into the notebook (future extensions) ---

# purity_filtering:
