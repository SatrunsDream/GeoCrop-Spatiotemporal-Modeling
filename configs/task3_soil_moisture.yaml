# Task 3 — Soil Moisture Anomaly Calculation
# SMAP L4 baseline climatology + event anomaly maps

study_area:
  states: null                        # null = full CONUS (or specify for a region)
  bbox: null

smap:
  product: SMAP_L4_SM                 # SMAP L4 surface soil moisture (9 km)
  temporal_resolution: weekly         # daily | weekly
  data_path: data/raw/smap/           # raw HDF5 (optional; not used by Parquet pipeline)
  processed_path: data/processed/smap/  # wide Parquet + metadata JSON per year
  variable: sm_surface

baseline:
  method: week_of_year                # day_of_year | week_of_year
  period: [2015, 2021]                # years used to compute climatology (μ and σ)
  anomaly_type: z_score               # z_score | percentile_rank | both

event_window:
  label: 2019_midwest_flood           # human-readable tag
  start_date: "2019-04-01"
  end_date: "2019-07-31"
  description: "2019 Midwest / Missouri–Mississippi flooding — excess moisture event"

cdl_mask:
  year: 2019
  crop_classes:
    cropland_general: [1, 5, 26, 28]  # corn, soybean, winter wheat, oats
  processed_parquet: data/processed/cdl/cdl_stack_wide.parquet
  data_path: data/raw/cdl/
  aggregation: area_weighted

spatial_subset:
  # Join SMAP to Task 2 rotation-eligible pixels only (same ~2.08M cells — tractable I/O).
  rotation_metrics_parquet: data/processed/task2/rotation_metrics.parquet

output:
  figures_dir: artifacts/figures/task3/
  tables_dir: artifacts/tables/task3/
  processed_dir: data/processed/task3/

run:
  seed: 42
