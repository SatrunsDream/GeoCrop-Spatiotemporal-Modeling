# Task 2 — Crop Rotation Pattern Identification
# 10-year CDL time series — corn/soybean rotation vs. monoculture vs. irregular

study_area:
  # 13-state U.S. Corn Belt (common USDA / Wikipedia definition; aligns with configs/study_extent.yaml)
  states:
    - Illinois
    - Indiana
    - Iowa
    - Kansas
    - Kentucky
    - Michigan
    - Minnesota
    - Missouri
    - Nebraska
    - North Dakota
    - Ohio
    - South Dakota
    - Wisconsin
  bbox: null

cdl:
  year_range: [2015, 2024]           # 10-year window (inclusive)
  crop_classes:
    corn: 1
    soybean: 5
  # Notebooks load CDL via ``src.io.cdl_parquet`` → ``data/processed/cdl/`` (not raw GeoTIFFs).
  data_path: data/processed/cdl/

# Pixels must appear as corn or soy in at least this many years to enter
# ``rotation_metrics.parquet`` (rotation-eligible denominator). Reduces noise
# from 1–2 “touch” years in the decade.
rotation_eligibility:
  min_cornsoy_years_for_metrics: 5

rotation_metrics:
  alternation_score:
    enabled: true                    # fraction of adjacent-year corn↔soy transitions
  run_length_penalty:
    enabled: true                    # penalize long consecutive monoculture runs
    max_run_threshold: 7             # ≥7 consecutive years = monoculture
  pattern_distance:
    enabled: true                    # RECRUIT-style edit distance to canonical patterns
    canonical_patterns:
      - [1, 5, 1, 5, 1, 5, 1, 5, 1, 5]   # corn-soy alternation
      - [5, 1, 5, 1, 5, 1, 5, 1, 5, 1]   # soy-corn alternation
    max_mismatches: 2
  entropy:
    enabled: true                    # Shannon entropy of crop sequence

classification:
  regular_rotation_threshold:
    alternation_score_min: 0.70
    pattern_distance_max: 3
    min_years_in_cornsoy: 7         # out of 10 years
  monoculture_threshold:
    max_run_min: 7                   # or crop share ≥ 0.80
  irregular: everything_else

# Conjugate Dirichlet–Multinomial per-pixel posteriors on corn/soy/other transitions (additive to rule-based classes).
# P(regular) = Monte Carlo fraction of draws where (P̂(corn→soy)+P̂(soy→corn))/2 ≥ regular_alt_proxy_min under independent Dirichlet rows.
bayesian_dm:
  enabled: true
  prior: jeffreys                    # jeffreys | uniform | informative_alternation
  informative_boost: 1.0           # extra pseudo-count on C→S and S→C when prior is informative_alternation
  n_posterior_samples: 256
  regular_alt_proxy_min: 0.70      # same scale as empirical alternation among corn/soy edges (not P sum to 1.4)
  min_origin_transitions: 1        # require at least this many year-pairs from corn or soy as origin
  chunk_rows: 48000                # pixels per chunk for MC draws (RAM vs speed)

spatial_smoothing:
  enabled: true
  kernel_size: 3                     # 3×3 majority filter to reduce CDL salt-and-pepper

output:
  figures_dir: artifacts/figures/task2/
  tables_dir: artifacts/tables/task2/
  # Notebook 04 (merged maps + areal) areal CSV + JSON (and run_bundle pointers): for Task 4 / report tables, not GeoTIFFs
  task4_tables_dir: artifacts/tables/task4/
  processed_dir: data/processed/task2/

run:
  seed: 42
