# Task 4 — Crop Type Classification (LightGBM)
# CDL history + NDVI phenology + SMAP soil moisture → crop type prediction
#
# ACTIVE KEYS: target_classes, cdl, panel, ndvi, smap, model, validation,
#              feature_importance, ablations, output, run
# Temporal split: train years ≤ 2021, val = 2022, test = 2023

study_area:
  states:                              # U.S. Corn Belt (13 states)
    - Illinois
    - Indiana
    - Iowa
    - Kansas
    - Kentucky
    - Michigan
    - Minnesota
    - Missouri
    - Nebraska
    - North Dakota
    - Ohio
    - South Dakota
    - Wisconsin
  bbox: null                           # [lon_min, lat_min, lon_max, lat_max] — override states if set

# Model labels (integer): 0=other_cropland, 1=corn, 2=soy, 3=winter_wheat
target_classes:
  corn: 1
  soybean: 5
  winter_wheat: 24
  cropland_max_code: 61

cdl:
  data_path: data/processed/cdl/cdl_stack_wide.parquet
  metadata_path: data/processed/cdl/cdl_stack_spatial_metadata.json
  mask_years: [2013, 2022]
  min_cropland_years_in_mask: 3
  history_lookback_years: 10
  lag_codes: 5

panel:
  train_years: [2013, 2022]
  train_split_max_year: 2021
  val_year: 2022
  test_year: 2023
  sample_per_year: 500000              # null or 0 to use all pixels

ndvi:
  source_dir: data/processed/ndvi/
  scale_to_physical: 250.0
  week_cols_pattern: "w"               # w000..w026 (growing-season subset in parquet)

smap:
  source_dir: data/processed/smap/
  parent_stride: 28
  growing_season_weeks: [17, 39]
  spring_weeks: [13, 18]
  smap_start_year: 2015

model:
  family: lightgbm
  hyperparameters:
    n_estimators: 500
    learning_rate: 0.05
    max_depth: 7
    num_leaves: 63
    subsample: 0.8
    colsample_bytree: 0.8
    random_state: 42
    is_unbalance: true
  early_stopping_rounds: 50

validation:
  strategy: temporal_holdout
  metrics: [overall_accuracy, macro_f1, per_class_f1, confusion_matrix]
  stratify_by_rotation_regime: true

feature_importance:
  enabled: true
  method: shap
  shap_sample_size: 1000

ablations:
  - { id: A, name: cdl_only,      features: [cdl] }
  - { id: B, name: cdl_ndvi,      features: [cdl, ndvi] }
  - { id: C, name: cdl_smap,      features: [cdl, smap] }
  - { id: D, name: cdl_ndvi_smap, features: [cdl, ndvi, smap] }

output:
  figures_dir: artifacts/figures/task4/
  tables_dir: artifacts/tables/task4/
  models_dir: artifacts/models/task4/
  processed_dir: data/processed/task4/

run:
  seed: 42
